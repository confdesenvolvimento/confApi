# ===== Wooba Sales =====
wooba.sales.developer-token=8c9e1803-c944-4d60-89c3-ac0f00f3e489
wooba.sales.developer-token-header-name=developer-token
wooba.sales.developer-access-code-header-name=developer-access-code
# Caso a Wooba troque a chave/prefixo, pode sobrescrever estes valores.
# wooba.sales.developer-access-code-prefix=3BMPT7Z3699O|
# wooba.sales.developer-access-code-public-key=

# Habilita mensagens operacionais do webhook Wooba no Telegram.
# Erros continuam sendo enviados mesmo com este rastreio desabilitado.
wooba.webhook.trace.enabled=false

# Habilita/desabilita todos os envios Telegram do fluxo Wooba Sales/Webhook.
# Quando false, nao envia rastreios nem erros da integracao Wooba para o Telegram.
wooba.telegram.enabled=false

# Habilita logs INFO operacionais do webhook Wooba no log do servidor.
# Warnings/erros continuam sendo registrados normalmente.
wooba.webhook.log.enabled=false


# Habilita/desabilita o processamento do webhook Wooba /sales.
# Quando false, o endpoint responde OK, mas nao busca details, nao grava e nao atualiza reservas.
wooba.webhook.sales.enabled=false

# Habilita/desabilita o polling de reservas aereas reservadas que nao chegam pelo webhook.
# Quando true, chama Wooba sales/list de minuto em minuto com TransactionTypes=[1] e TransactionStates=[2].
wooba.sales.polling.reserved.enabled=false
wooba.sales.polling.reserved.fixed-delay-ms=60000
wooba.sales.polling.reserved.initial-delay-ms=15000
wooba.sales.polling.reserved.lookback-minutes=5
wooba.sales.polling.reserved.max-items-per-cycle=200

# Habilita/desabilita os endpoints de teste em /api/wooba/teste.
# Em producao deve ficar false.
wooba.test-controller.enabled=false


